name: Sync from Upstream

on:
  schedule:
    - cron: '0 4 * * 0'  # 每周日 UTC 4:00 自动执行
  workflow_dispatch:     # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/FDio/vpp.git

      - name: Fetch upstream (incl. all tags)
        run: git fetch --tags upstream

      - name: Merge upstream/master into master
        run: git merge --no-edit upstream/master

      # 必须用带 workflow scope 的 PAT，不能用 GITHUB_TOKEN：上游 tag 内含
      # .github/workflows/*.yml，GitHub 拒绝任何缺少 `workflows` 权限的 token 推送/
      # 修改 workflow 文件，而 GITHUB_TOKEN 无法被授予该权限。
      # 创建一个 classic PAT（勾选 repo + workflow）或 fine-grained PAT
      # （Contents + Workflows 写权限），加为仓库 secret：SYNC_PAT。
      - name: Set push URL to use token
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          if [ -z "$SYNC_PAT" ]; then
            echo "::error::Secret SYNC_PAT is not set. Create a PAT with 'repo' + 'workflow' scopes (classic) or Contents+Workflows write (fine-grained) and add it as repo secret SYNC_PAT. GITHUB_TOKEN cannot push the .github/workflows/* contained in upstream tags."
            exit 1
          fi
          git remote set-url origin \
            "https://x-access-token:${SYNC_PAT}@github.com/${{ github.repository }}.git"

      - name: Push to your repo
        run: |
          git push origin master
          # 推送上游全部 release tag（vYY.MM，如 v25.06 / v25.06.1）。
          # 这是镜像构建的源码依据：build-images 会 checkout 最新 tag 后用
          # `COPY .` 从该 tag 的工作树构建，因此 push tag 让这些版本可被构建。
          git push origin --tags
