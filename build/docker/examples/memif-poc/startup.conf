unix {
  nodaemon
  log /var/log/vpp/vpp.log
  cli-listen /run/vpp/cli.sock
  gid vpp
}
api-segment { gid vpp }
cpu { main-core 0 }
## 调小 buffer，让两份 VPP 都能挤进 Docker Desktop 的 ~28 个 hugepage
buffers { buffers-per-numa 4096 }
## 注意：main-heap 不能太小，否则插件初始化会段错误（128M 崩、≥256M 正常）
memory { main-heap-size 512M }
plugins {
  ## Docker Desktop(/dev/hugepages 为 devtmpfs)下禁用 dpdk；memif 插件默认启用
  plugin dpdk_plugin.so { disable }
}
